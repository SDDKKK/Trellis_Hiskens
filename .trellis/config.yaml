# Trellis Configuration
# Project-level settings for the Trellis workflow system
#
# All values have sensible defaults. Only override what you need.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

# Commit message used when auto-committing journal/index changes
# after running add_session.py
session_commit_message: "chore: record journal"

# Maximum lines per journal file before rotating to a new one
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# Session Context
#-------------------------------------------------------------------------------

# Scope filter for spec injection during session-start.
# Useful for monorepos with multiple packages.
# If null or omitted, all specs are injected (default behavior).
#
# spec_scope: null                  # Inject all specs (default)
# spec_scope: "active_task"         # Only inject specs for the active task's package
# spec_scope: ["cli", "core"]       # Only inject specs for listed packages
session:
  spec_scope: active_task

#-------------------------------------------------------------------------------
# Update Skip Paths
#-------------------------------------------------------------------------------

# Files or directories to skip during `trellis update`.
# Use this to prevent update from re-adding files you intentionally removed.
#
# update:
#   skip:
#     - .claude/commands/
#     - .agents/skills/

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

# Shell commands to run after task lifecycle events.
# Each hook receives TASK_JSON_PATH environment variable pointing to task.json.
# Hook failures print a warning but do not block the main operation.
#
# hooks:
#   after_create:
#     - "echo 'Task created'"
#   after_start:
#     - "echo 'Task started'"
#   after_finish:
#     - "echo 'Task finished'"
#   after_archive:
#     - "echo 'Task archived'"

#-------------------------------------------------------------------------------
# Features (config-driven behavior for shared scripts)
#-------------------------------------------------------------------------------

# Feature flags that control project-specific behavior in shared Python scripts.
# Shared scripts read these flags from config.yaml to enable/disable features.
# Missing features section or individual flags default to false (graceful degradation).
#
# ccr_routing:       Enable CCR (Claude Code Router) model tag injection in hooks.
#                    Requires agent-models.json config and CCR proxy running on localhost.
# reference_support: Enable --reference flag in task.py add-context command.
#                    Allows injecting only index.md from directories (spec three-layer injection).
# java_support:      Enable Java-related cross-layer checks and tooling. (reserved for Anhui_CIM)
# extra_platforms:   Additional platforms to detect alongside built-in ones. (reserved for future)
features:
  ccr_routing: true
  reference_support: true
  java_support: false
  extra_platforms: []
